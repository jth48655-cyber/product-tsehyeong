
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-info">
        <div class="dev-name">Developer: Taehyeong (1982)</div>
        <div class="win-msg">✨ Good Luck! Congratulations on Winning! ✨</div>
    </div>

    <div class="controls">
        <div class="volume-control">
            <input type="range" id="volume-slider" min="0" max="100" value="50" step="1" aria-label="Volume">
        </div>
        <button id="theme-toggle" class="control-btn" aria-label="Toggle theme">🌓</button>
        <button id="music-toggle" class="control-btn" aria-label="Toggle music">🎵</button>
    </div>
    
    <div id="player" style="position: absolute; width: 0; height: 0; pointer-events: none; opacity: 0;"></div>

    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <div class="button-group">
            <button id="generate-btn">Generate Numbers</button>
            <button id="reset-btn" class="secondary">Reset</button>
        </div>
        <div id="history-section" class="history-section">
            <h3>Recent Sets</h3>
            <ul id="history-list"></ul>
        </div>

        <div class="contact-section">
            <h3>Partnership Inquiry</h3>
            <form action="https://formspree.io/f/mojyvajv" method="POST" class="contact-form">
                <input type="email" name="email" placeholder="Your Email" required>
                <textarea name="message" placeholder="Your Message" required></textarea>
                <button type="submit">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="main.js"></script>
</body>
</html>
